{%for v in modules%}
    {%if v.get("broken") != True %}
    <div class="module" onclick='executeRequire(`{{v["module"]}}`);'>
        <img src='{{v["image"]}}' class="preview-img">
        <h4>
            {{v["name"]}}
            <div class="badges">
                {%for badge in v["badges"]%}
                    <h6>{{badge}}</h6>
                {%endfor%}
            </div>
        </h4>
        <h5 style="color: #b9b9b9;">{{v["author"]}}</h5>
        <h5 class="description">{{v["description"]}}
            {%if v.get("controls") != None%}<a class="module-controls" onclick='
            
            if (!e) var e = window.event;
            e.cancelBubble = true;
            if (e.stopPropagation) e.stopPropagation();
            Swal.fire({textalign:`left`, html:`<p style="text-align: left; white-space: pre;">{{v["controls"]}}</p>`})

            ' href="#">Click for controls.</a>
            {%endif%}</h5>
    </div>
    {%endif%}
{%endfor%}
