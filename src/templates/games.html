{%if message != ""%}
<p style="width: 100%; text-align: center;">{{message}}</p>
<br>
<br>
{%endif%}
{%for v in games%}
    <div class="module" onclick='window.open(`{{v["url"]}}`);'>
        <img src='{{v["thumbnail"]}}' class="preview-img">
        <h3>{{v["data"][0]["name"]}}</h3>
        <h5><i class='bx bxs-user'></i> {{"{:,}".format(v["data"][0]["visits"])}} visits</h5>
    </div>
{%endfor%}
