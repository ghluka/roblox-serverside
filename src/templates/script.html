{% extends "base.html" %}

{% block extra_css %}
        <link rel="stylesheet" media="screen" href="/assets/css/sidebar.css">
        <link rel="stylesheet" media="screen" href="/assets/css/editor.css">
        <link rel="stylesheet" media="screen" href="/assets/css/script.css">
{% endblock %}

{% block head_extras %}
        <meta content="NettSS" property="og:title">
        <meta content="An open-source server-side LuaU executor for Roblox over HTTP. Allows in-game code execution and administration." property="og:description">
{% endblock %}

{% block body %}
        <div style="text-align: center;">
            <h1 onclick="window.location.href = '/'"><div class="logo_name"><span style="color: #bc49db;">Nett</span><span>SS</span></div></h1>
            <p>Put this script in your game, make sure <a href="https://create.roblox.com/docs/reference/engine/classes/HttpService#HttpEnabled">HTTPEnabled</a> is true.</p>
            <p>After that, our team will manually review it and add it to the website!</p>
        </div>
        <div id="tabs" style="display:flex; gap:4px; padding:6px;"></div>
        <div id="container" style="width: 100%; height: calc(100svh - 151px)!important;"></div>
        <script src="/assets/vs/loader.js"></script>
        <script defer src="/assets/js/editor.js"></script>
        <script defer src="/assets/js/scripts.js"></script>
{% endblock %}
