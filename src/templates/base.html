<!DOCTYPE html>
<html lang="en">

        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block title %}NettSS{% endblock %}</title>
        <link rel="icon" href="/favicon.ico" sizes="any">
        <link rel="apple-touch-icon" href="/favicon.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Inter:wght@100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
        <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
        <link rel="stylesheet" href="/assets/css/index.css">
        {% block extra_css %}{% endblock %}
        <meta content="#bc49db" data-react-helmet="true" name="theme-color">
        <meta name="color-scheme" content="dark">
        {% block head_extras %}{% endblock %}

        {% block body %}{% endblock %}
